name: Scrape Ticket Prices

on:
  schedule:
    # Runs every 15 min. Actual scrape frequency is controlled from the dashboard
    # under Alerts & Settings → Resale Scrape Interval.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}      # Also triggered from the dashboard "Scrape Prices" button

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if scrape is due
        id: check
        run: |
          RESULT=$(curl -sf "${{ secrets.WORKER_URL }}/api/should-scrape" || echo '{"shouldRun":true}')
          echo "should_run=$(echo $RESULT | jq -r '.shouldRun')" >> $GITHUB_OUTPUT

  scrape:
    needs: check
    if: github.event_name == 'workflow_dispatch' || needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/package.json') }}

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run price scraper
        working-directory: scraper
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          TRIGGER_EVENT: ${{ github.event_name }}
        run: npm run scrape

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: scraper/debug-*.png
          if-no-files-found: ignore
          retention-days: 1
